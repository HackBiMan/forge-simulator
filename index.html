<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>S9 HBM</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand-container">
            <div class="nav-brand">Forge Master Simulator</div>
            <div class="nav-author">Made by &lt;S9 KFC[CLUB] HBM&gt;</div>
        </div>
        <div class="nav-links">
            <button class="nav-tab active" onclick="switchTab('forgePage', this)">대장간</button>
            <button class="nav-tab" onclick="switchTab('skillPage', this)">스킬</button>
            <button class="nav-tab" onclick="switchTab('petPage', this)">펫</button>
            <button class="nav-tab" onclick="switchTab('mountPage', this)">탈것</button>
            <button class="nav-tab" onclick="switchTab('guidePage', this)"
                style="color: #d066ff;">승천 가이드</button>
            <button class="nav-tab" onclick="switchTab('leaguePage', this)"
                style="color: #ffaa00; margin-left: auto;">리그/전쟁</button>
            <button class="nav-tab" onclick="switchTab('dataPage', this)"
                style="color: var(--neon-cyan);">확률 도감</button>
        </div>
    </nav>

    <div class="container">
        <!-- 대장간 계산기 -->
        <div id="forgePage" class="page active">
            <div class="card">
                <h2>대장간 기술트리 입력</h2>
                <div id="forgeGlobalContainer" style="margin-bottom: 20px;"></div>
                <div id="forgeTiers" class="equip-grid"></div>
            </div>

            <div class="card">
                <h2>장비레벨 기술트리 입력</h2>
                <div id="forgeEquipAllContainer"></div>
                <div id="forgeEquipParts" class="equip-grid" style="margin-top: 15px;"></div>
            </div>

            <div class="card" id="forge_simulatorContainer"></div>
        </div>

        <!-- 스킬 계산기 -->
        <div id="skillPage" class="page">
            <div class="card">
                <div class="tech-tree-header">
                    <h2 style="margin: 0; border: none; padding: 0;">스킬 기술트리 입력</h2>
                </div>
                <div id="skillTiers" class="equip-grid"></div>
            </div>

            <div class="card" id="skill_simulatorContainer"></div>
        </div>

        <!-- 펫 계산기 -->
        <div id="petPage" class="page">
            <div class="card">
                <div class="tech-tree-header">
                    <h2 style="margin: 0; border: none; padding: 0;">펫 기술트리 입력</h2>
                </div>
                <div id="petTiers" class="equip-grid"></div>
            </div>

            <div class="card" id="pet_simulatorContainer"></div>
        </div>

        <!-- 탈것 계산기 -->
        <div id="mountPage" class="page">
            <div class="card">
                <div class="tech-tree-header">
                    <h2 style="margin: 0; border: none; padding: 0;">탈것 기술트리 입력</h2>
                </div>
                <div id="mountTiers" class="equip-grid">
                    <div id="mountCostTiers"></div>
                    <div id="mountBonusTiers"></div>
                </div>
            </div>

            <div class="card" id="mount_simulatorContainer"></div>
        </div>

        <!-- 통합 확률 도감 탭 -->
        <div id="dataPage" class="page">
            <div class="card">
                <h2 style="text-align: center;">확률 도감 (기술트리 미반영)</h2>
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; margin-bottom: 15px;">
                    <div class="global-tier-btns" style="margin-bottom: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex: 1;">
                        <button class="g-btn active" onclick="showDataTab('forge')">대장간</button>
                        <button class="g-btn" onclick="showDataTab('skill')">스킬</button>
                        <button class="g-btn" onclick="showDataTab('pet')">펫</button>
                        <button class="g-btn" onclick="showDataTab('mount')">탈것</button>
                    </div>
                    <div class="global-tier-btns" style="margin-bottom: 0;">
                        <button id="data_majorBtn" class="g-btn g-btn-action active" onclick="toggleMajorLevels()">주요 레벨만 표시</button>
                        <button id="data_sortBtn" class="g-btn g-btn-action" onclick="toggleDataSort()">정렬: 오름차순 (저렙 ➔ 고렙)</button>
                    </div>
                </div>
                <div id="data_table_container"
                    style="overflow-x: auto; max-height: 600px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <!-- 동적 테이블 렌더링 영역 -->
                </div>
            </div>
        </div>
        <!-- 승천 가이드 탭 -->
        <div id="guidePage" class="page">
            <div class="card">
                <h2 style="text-align: center;">승천 가이드</h2>
                <div class="global-tier-btns" style="margin-bottom: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                    <button class="g-btn active" id="guideTab_forge" onclick="switchGuideTab('forge')">대장간</button>
                    <button class="g-btn" id="guideTab_skill" onclick="switchGuideTab('skill')">스킬</button>
                    <button class="g-btn" id="guideTab_pet" onclick="switchGuideTab('pet')">펫</button>
                    <button class="g-btn" id="guideTab_mount" onclick="switchGuideTab('mount')">탈것</button>
                </div>
                
                <div id="guide_forge" style="display: block; height: 100%;">
                    <div class="guide-control-bar">
                        <span style="font-size: 16px; font-weight: bold; color: var(--gold); white-space: nowrap;">장비레벨 :</span>
                        <div id="forgeGuideEquipBtns" class="global-tier-btns-wrap">
                            <button class="g-btn active" onclick="setForgeGuideEquip(0)">99</button>
                            <button class="g-btn" onclick="setForgeGuideEquip(5)">109</button>
                            <button class="g-btn" onclick="setForgeGuideEquip(10)">119</button>
                            <button class="g-btn" onclick="setForgeGuideEquip(15)">129</button>
                            <button class="g-btn" onclick="setForgeGuideEquip(20)">139</button>
                            <button class="g-btn" onclick="setForgeGuideEquip(25)">149</button>
                        </div>
                        <div class="guide-divider"></div>
                        <span style="font-size: 16px; font-weight: bold; color: var(--gold); white-space: nowrap;">단위 :</span>
                        <div id="forgeGuideDisplayBtns" class="global-tier-btns-wrap">
                            <button class="g-btn active" onclick="setForgeGuideDisplay('gold')">필요 골드</button>
                            <button class="g-btn" onclick="setForgeGuideDisplay('hammer')">필요 망치</button>
                        </div>
                    </div>
                    <div style="overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 18px;">
                            <thead id="guide_forge_thead"></thead>
                            <tbody id="guide_forge_tbody"></tbody>
                        </table>
                    </div>
                </div>
                
                <div id="guide_skill" style="display: none; height: 100%;">
                    <div style="overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 18px;">
                            <thead id="guide_skill_thead"></thead>
                            <tbody id="guide_skill_tbody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="guide_pet" style="display: none; height: 100%;">
                    <div style="overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 18px;">
                            <thead id="guide_pet_thead"></thead>
                            <tbody id="guide_pet_tbody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="guide_mount" style="display: none; height: 100%;">
                    <div style="overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 18px;">
                            <thead id="guide_mount_thead"></thead>
                            <tbody id="guide_mount_tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 리그/전쟁 탭 -->
        <div id="leaguePage" class="page">
            <div class="card">
                <h2 style="text-align: center;">리그/전쟁 보상 정리</h2>
                <div class="global-tier-btns" style="margin-bottom: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                    <button class="g-btn active" id="leagueTab_rankedLeagueRewards" onclick="switchLeagueTab('rankedLeagueRewards')">개인 리그 보상</button>
                    <button class="g-btn" id="leagueTab_clanWarRewards" onclick="switchLeagueTab('clanWarRewards')">클랜 전쟁 보상</button>
                    <button class="g-btn" id="leagueTab_individualClanRewards" onclick="switchLeagueTab('individualClanRewards')">개인 클랜 보상</button>
                    <button class="g-btn" id="leagueTab_clanWarDayActions" onclick="switchLeagueTab('clanWarDayActions')">전쟁 일일 미션</button>
                </div>

                <div id="league_clanWarRewards" style="display: block; height: 100%;">
                    <div class="league-table-wrapper" style="height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 16px;">
                            <thead id="league_cwr_thead"></thead>
                            <tbody id="league_cwr_tbody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="league_rankedLeagueRewards" style="display: none; height: 100%;">
                    <div id="league_rlr_container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; padding: 5px;">
                        <!-- 6 tables will be injected here -->
                    </div>
                </div>

                <div id="league_individualClanRewards" style="display: none; height: 100%;">
                    <div class="league-table-wrapper" style="height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 16px;">
                            <thead id="league_icr_thead"></thead>
                            <tbody id="league_icr_tbody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="league_clanWarDayActions" style="display: none; height: 100%;">
                    <div class="league-table-wrapper" style="height: 100%;">
                        <table class="guide-table" style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; font-size: 16px;">
                            <thead id="league_cwda_thead"></thead>
                            <tbody id="league_cwda_tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="calculators.js"></script>
    <script src="app.js"></script>
</body>

</html>
